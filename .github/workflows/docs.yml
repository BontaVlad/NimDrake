name: Docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install DuckDB
        run: |
          wget -q https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-linux-amd64.zip
          unzip -o libduckdb-linux-amd64.zip -d duckdb-install
          sudo cp duckdb-install/libduckdb.so /usr/lib/
          sudo cp duckdb-install/duckdb.h /usr/include/
          sudo ldconfig

      - name: Cache Nim
        uses: actions/cache@v4
        with:
          path: |
            ~/nimdir
            ~/.nimble
            ~/.cache/nim
          key: ${{ runner.os }}-nim-docs-${{ hashFiles('*.nimble') }}
          restore-keys: |
            ${{ runner.os }}-nim-docs-

      - uses: iffy/install-nim@v5
        with:
          version: binary:stable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nim dependencies
        run: nimble install -y

      - name: Generate API docs
        run: |
          nimble doc --project --outdir:docs src/nimdrake.nim
          mv docs/theindex.html docs/index.html
          touch docs/.nojekyll

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/deploy-pages@v4
