name: Tests

on:
  pull_request:
  push:

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        version:
          - binary:stable
        os:
          - ubuntu-24.04
          - macos-latest
          - windows-latest
        include:
          - os: windows-latest
            nim_exe: C:/msys64/mingw64/bin/nim.exe
    env:
      NIMBLE_USE_SYSTEM_NIM: "1"
    steps:
    - uses: actions/checkout@v4

    - uses: extractions/setup-just@v2

    - name: Install Nim
      uses: iffy/install-nim@v5
      with:
        version: ${{ matrix.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Cache Nim (non-Windows)
      if: runner.os != 'Windows'
      uses: actions/cache@v4
      with:
        path: |
          ~/nimdir
          ~/.nimble
          ~/.cache/nim
        key: ${{ runner.os }}-nim-${{ matrix.version }}-${{ hashFiles('*.nimble') }}
        restore-keys: |
          ${{ runner.os }}-nim-${{ matrix.version }}-
          ${{ runner.os }}-nim-

    - name: Cache DuckDB (Linux — src/include/)
      if: runner.os == 'Linux'
      id: cache-duckdb-linux
      uses: actions/cache@v4
      with:
        path: src/include
        key: Linux-duckdb-v1.5.4-${{ hashFiles('justfile') }}
        restore-keys: |
          Linux-duckdb-v1.5.4-
          Linux-duckdb-

    - name: Cache DuckDB (macOS — extracted zip)
      if: runner.os == 'macOS'
      id: cache-duckdb-macos
      uses: actions/cache@v4
      with:
        path: .duckdb-cache
        key: macOs-duckdb-v1.5.4-${{ hashFiles('.github/workflows/tests.yml') }}
        restore-keys: |
          macOs-duckdb-v1.5.4-
          macOs-duckdb-

    - name: Cache DuckDB (Windows — extracted zip)
      if: runner.os == 'Windows'
      id: cache-duckdb-windows
      uses: actions/cache@v4
      with:
        path: .duckdb-cache
        key: Windows-duckdb-v1.5.4-${{ hashFiles('.github/workflows/tests.yml') }}
        restore-keys: |
          Windows-duckdb-v1.5.4-
          Windows-duckdb-

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        cache: true
        path-type: inherit
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-pkg-config
          mingw-w64-x86_64-git
          unzip

    - name: Vendor DuckDB (Linux)
      if: steps.cache-duckdb-linux.outputs.cache-hit != 'true' && runner.os == 'Linux'
      run: just fetch-lib

    - name: Download & extract DuckDB (macOS)
      if: steps.cache-duckdb-macos.outputs.cache-hit != 'true' && runner.os == 'macOS'
      run: |
        mkdir -p .duckdb-cache
        wget -q https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-osx-universal.zip -O .duckdb-cache/libduckdb.zip
        unzip -o .duckdb-cache/libduckdb.zip -d .duckdb-cache/

    - name: Install DuckDB (macOS)
      if: runner.os == 'macOS'
      run: |
        sudo mkdir -p /usr/local/lib /usr/local/include
        sudo cp .duckdb-cache/libduckdb.dylib /usr/local/lib/
        sudo cp .duckdb-cache/duckdb.h /usr/local/include/

    - name: Download & extract DuckDB (Windows)
      if: steps.cache-duckdb-windows.outputs.cache-hit != 'true' && runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        mkdir -p .duckdb-cache
        curl -sL -o .duckdb-cache/libduckdb.zip https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-windows-amd64.zip
        unzip -o .duckdb-cache/libduckdb.zip -d .duckdb-cache/

    - name: Install DuckDB (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        cp .duckdb-cache/duckdb.dll C:/msys64/mingw64/bin/
        cp .duckdb-cache/duckdb.h C:/msys64/mingw64/include/
        cp .duckdb-cache/libduckdb.lib C:/msys64/mingw64/lib/ || cp .duckdb-cache/duckdb.lib C:/msys64/mingw64/lib/ || true

    - name: Verify installations (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        echo "=== DuckDB ==="
        ls -la src/include/libduckdb.* /usr/lib/libduckdb* /usr/local/lib/libduckdb* 2>/dev/null || true
        echo "=== Nim ==="
        nim --version

    - name: Verify installations (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        echo "=== DuckDB ==="
        ls -la C:/msys64/mingw64/bin/duckdb.dll
        echo "=== Nim ==="
        nim --version

    - name: Install Nim dependencies (Unix)
      if: runner.os != 'Windows'
      run: nimble install -y

    - name: Install Nim dependencies (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: nimble install -y --useSystemNim --verbose

    - name: Test (Linux)
      if: runner.os == 'Linux'
      run: just test

    - name: Test (macOS)
      if: runner.os == 'macOS'
      run: just test

    - name: Test (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: just test
