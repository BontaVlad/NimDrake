name: Tests

on:
  pull_request:
  push:

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        version:
          - binary:stable
        os:
          - ubuntu-24.04
          - macos-latest
          - windows-latest
        include:
          - os: windows-latest
            nim_exe: C:/msys64/mingw64/bin/nim.exe
    env:
      NIMBLE_USE_SYSTEM_NIM: "1"
    steps:
    - uses: actions/checkout@v4

    - uses: extractions/setup-just@v2

    - name: Install Nim
      uses: iffy/install-nim@v5
      with:
        version: ${{ matrix.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Cache Nim (non-Windows)
      if: runner.os != 'Windows'
      uses: actions/cache@v4
      with:
        path: |
          ~/nimdir
          ~/.nimble
          ~/.cache/nim
        key: ${{ runner.os }}-nim-${{ matrix.version }}-${{ hashFiles('*.nimble') }}
        restore-keys: |
          ${{ runner.os }}-nim-${{ matrix.version }}-
          ${{ runner.os }}-nim-

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        cache: true
        path-type: inherit
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-pkg-config
          mingw-w64-x86_64-git
          unzip

    - name: Install DuckDB (Linux)
      if: runner.os == 'Linux'
      run: |
        wget -q https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-linux-amd64.zip
        unzip -o libduckdb-linux-amd64.zip -d duckdb-install
        sudo cp duckdb-install/libduckdb.so /usr/lib/
        sudo cp duckdb-install/duckdb.h /usr/include/
        sudo ldconfig

    - name: Install DuckDB (macOS)
      if: runner.os == 'macOS'
      run: |
        wget -q https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-osx-universal.zip
        unzip -o libduckdb-osx-universal.zip -d duckdb-install
        sudo mkdir -p /usr/local/lib /usr/local/include
        sudo cp duckdb-install/libduckdb.dylib /usr/local/lib/
        sudo cp duckdb-install/duckdb.h /usr/local/include/

    - name: Install DuckDB (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        curl -sL -o libduckdb-windows-amd64.zip https://github.com/duckdb/duckdb/releases/download/v1.5.4/libduckdb-windows-amd64.zip
        unzip -o libduckdb-windows-amd64.zip -d duckdb-install
        cp duckdb-install/duckdb.dll C:/msys64/mingw64/bin/
        cp duckdb-install/duckdb.h C:/msys64/mingw64/include/
        cp duckdb-install/libduckdb.lib C:/msys64/mingw64/lib/ || cp duckdb-install/duckdb.lib C:/msys64/mingw64/lib/ || true

    - name: Verify installations (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        echo "=== DuckDB ==="
        ls -la /usr/lib/libduckdb* /usr/local/lib/libduckdb* 2>/dev/null || true
        echo "=== Nim ==="
        nim --version

    - name: Verify installations (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        echo "=== DuckDB ==="
        ls -la C:/msys64/mingw64/bin/duckdb.dll
        echo "=== Nim ==="
        nim --version

    - name: Install Nim dependencies (Unix)
      if: runner.os != 'Windows'
      run: nimble install -y

    - name: Install Nim dependencies (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: nimble install -y --useSystemNim --verbose

    - name: Test (Linux)
      if: runner.os == 'Linux'
      run: just test

    - name: Test (macOS)
      if: runner.os == 'macOS'
      run: just test

    - name: Test (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: just test
